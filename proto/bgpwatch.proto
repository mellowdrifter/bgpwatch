syntax = "proto3";

package bgpwatch;

option go_package = "github.com/mellowdrifter/bgpwatch/proto";

message Empty {}

message TotalsResponse {
  int32 ipv4_count = 1;
  int32 ipv6_count = 2;
  int64 total_ipv4_paths = 3;
  int64 total_ipv6_paths = 4;
}

message MasksResponse {
  map<int32, int32> ipv4_masks = 1;
  map<int32, int32> ipv6_masks = 2;
}

// RouteRequest specifies a route to look up.
// If address contains a prefix length (e.g. "1.1.2.0/24"), an exact prefix match is performed.
// If address is a bare IP (e.g. "1.1.1.1"), a longest prefix match (LPM) is performed.
message RouteRequest {
  string address = 1;
}

message Community {
  uint32 high = 1;
  uint32 low = 2;
}

message LargeCommunity {
  uint32 global_admin = 1;
  uint32 local_data1 = 2;
  uint32 local_data2 = 3;
}

message Route {
  string prefix = 1;
  repeated uint32 as_path = 2;
  uint32 local_pref = 3;
  repeated Community communities = 4;
  repeated LargeCommunity large_communities = 5;
  string peer_ip = 6;
}

message RouteLookupResponse {
  bool found = 1;
  Route route = 2;
}

message RoutesResponse {
  repeated Route routes = 1;
}

message Prefix {
  string prefix = 1;
}

message PrefixesResponse {
  repeated Prefix prefixes = 1;
}

message PeerStats {
  uint64 established_duration_seconds = 1;
  uint64 total_advertisements = 2;
  uint64 total_withdrawals = 3;
  uint64 rib_ram_bytes = 4;
}

message SystemStatsResponse {
  uint64 total_app_ram_bytes = 1;
  uint64 heap_alloc_bytes = 2;
  uint64 heap_sys_bytes = 3;
  uint64 heap_idle_bytes = 4;
  uint64 heap_released_bytes = 5;
  uint32 num_gc = 6;
  uint64 global_rib_ram_bytes = 7;
  map<string, PeerStats> peer_stats = 8;
}


message AsPathRequest {
  string regex = 1;
}

// OriginRequest specifies an ASN to query for originated prefixes.
message OriginRequest {
  uint32 asn = 1;
}

service BGPWatch {
  // GetTotals returns the total number of IPv4 and IPv6 prefixes across all peers.
  rpc GetTotals(Empty) returns (TotalsResponse);

  // GetMasks returns the subnet mask distributions for IPv4 and IPv6.
  rpc GetMasks(Empty) returns (MasksResponse);

  // GetSystemStats returns memory usage statistics for the system and per peer.
  rpc GetSystemStats(Empty) returns (SystemStatsResponse);

  // GetRoute looks up a route by IP address (LPM) or CIDR prefix (exact match).
  rpc GetRoute(RouteRequest) returns (RouteLookupResponse);

  // GetRoutes looks up a route across all peers.
  rpc GetRoutes(RouteRequest) returns (RoutesResponse);

  // GetPrefixesByOrigin returns all IPv4 and IPv6 prefixes originated by the given ASN (lightweight).
  rpc GetPrefixesByOrigin(OriginRequest) returns (PrefixesResponse);

  // GetRoutesByOrigin returns all IPv4 and IPv6 routes originated by the given ASN (detailed).
  rpc GetRoutesByOrigin(OriginRequest) returns (RoutesResponse);

  // GetPrefixesByAsPath returns all IPv4 and IPv6 prefixes matching the given AS path regex.
  rpc GetPrefixesByAsPath(AsPathRequest) returns (RoutesResponse);
}
