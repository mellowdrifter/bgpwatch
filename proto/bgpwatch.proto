syntax = "proto3";

package bgpwatch;

option go_package = "github.com/mellowdrifter/bgpwatch/proto";

message Empty {}

message TotalsResponse {
  int32 ipv4_count = 1;
  int32 ipv6_count = 2;
}

message MasksResponse {
  map<int32, int32> ipv4_masks = 1;
  map<int32, int32> ipv6_masks = 2;
}

// RouteRequest specifies a route to look up.
// If address contains a prefix length (e.g. "1.1.2.0/24"), an exact prefix match is performed.
// If address is a bare IP (e.g. "1.1.1.1"), a longest prefix match (LPM) is performed.
message RouteRequest {
  string address = 1;
}

// RouteResponse contains the result of a route lookup.
message RouteResponse {
  // Whether a matching route was found.
  bool found = 1;

  // The matched prefix in CIDR notation (e.g. "1.1.1.0/24").
  // Empty when found is false.
  string prefix = 2;

  // BGP path attributes of the matched route.
  // All fields are empty/zero when found is false.
  string as_path = 3;
  uint32 local_pref = 4;
  repeated string communities = 5;
  repeated string large_communities = 6;
}

message SystemStatsResponse {
  uint64 total_ram_bytes = 1;
  map<string, uint64> peer_ram_bytes = 2;
}

// OriginRequest specifies an ASN to query for originated prefixes.
message OriginRequest {
  uint32 asn = 1;
}

// OriginResponse contains all prefixes originated by the requested ASN.
message OriginResponse {
  repeated string ipv4_prefixes = 1;
  repeated string ipv6_prefixes = 2;
}

service BGPWatch {
  // GetTotals returns the total number of IPv4 and IPv6 prefixes across all peers.
  rpc GetTotals(Empty) returns (TotalsResponse);

  // GetMasks returns the subnet mask distributions for IPv4 and IPv6.
  rpc GetMasks(Empty) returns (MasksResponse);

  // GetSystemStats returns memory usage statistics for the system and per peer.
  rpc GetSystemStats(Empty) returns (SystemStatsResponse);

  // GetRoute looks up a route by IP address (LPM) or CIDR prefix (exact match).
  rpc GetRoute(RouteRequest) returns (RouteResponse);

  // GetPrefixesByOrigin returns all IPv4 and IPv6 prefixes originated by the given ASN.
  rpc GetPrefixesByOrigin(OriginRequest) returns (OriginResponse);
}
